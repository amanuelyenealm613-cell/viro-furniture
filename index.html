<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>መረጃ መላኪያ ፎርም</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .form-container {
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #0088cc;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #006699;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>የክፍያ መረጃ መሙያ</h2>
    <form id="paymentForm">
      
      <div class="form-group">
        <label for="phone">ስልክ ቁጥር *</label>
        <input type="tel" id="phone" placeholder="0911..." required>
      </div>

      <div class="form-group">
        <label for="paymentMethod">የክፍያ መንገድ ይምረጡ *</label>
        <select id="paymentMethod" required>
          <option value="">-- ይምረጡ --</option>
          <option value="ሲቢኢ ብር (CBE Birr)">ሲቢኢ ብር (CBE Birr / Commercial Bank)</option>
          <option value="ቴሌብር (Telebirr)">ቴሌብር (Telebirr)</option>
          <option value="አዋሽ ባንክ (Awash Bank)">አዋሽ ባንክ (Awash Bank)</option>
          <option value="አቢሲኒያ ባንክ (Bank of Abyssinia)">አቢሲኒያ ባንክ (Bank of Abyssinia)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="refNo">የክፍያ ትራንዛክሽን ቁጥር / Ref No. *</label>
        <input type="text" id="refNo" placeholder="ምሳሌ፡ TXN123456" required>
      </div>

      <button type="submit" id="submitBtn">መረጃውን ላክ</button>

    </form>
  </div>

  <script>
    // የገባው Bot Token እና Chat ID
    const BOT_TOKEN = '8762925667:AAHOMw311XdcubZWs-dBI1Xz7uS7QgKOVK8';
    const CHAT_ID = '7303942788';

    const form = document.getElementById('paymentForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault(); // ፔጁ እንዳይነሳ (Reload እንዳይሆን) ይከለክላል

      const originalBtnText = submitBtn.innerText;
      submitBtn.innerText = 'በመላክ ላይ... እባክዎ ይጠበቁ';
      submitBtn.disabled = true;

      const phone = document.getElementById('phone').value;
      const paymentMethod = document.getElementById('paymentMethod').value;
      const refNo = document.getElementById('refNo').value;

      // ወደ ቴሌግራም የሚላከው መልዕክት አጻጻፍ
      const messageText = `📌 አዲስ የክፍያ መረጃ ደርሷል!\n\n📱 ስልክ ቁጥር: ${phone}\n💳 የክፍያ መንገድ: ${paymentMethod}\n🧾 የትራንዛክሽን ቁጥር: ${refNo}`;

      const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

      try {
        const response = await fetch(telegramUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: messageText
          })
        });

        const data = await response.json();

        if (data.ok) {
          alert("መረጃው በትክክል ተልኳል!");
          form.reset();
        } else {
          console.error("Telegram API Error:", data);
          alert("ስህተት፡ " + (data.description || "መረጃውን መላክ አልተቻለም"));
        }
      } catch (error) {
        console.error("Network Error:", error);
        alert("የኢንተርኔት ግንኙነት ችግር አጋጥሟል! እባክዎ ድጋሚ ይሞክሩ።");
      } finally {
        submitBtn.innerText = originalBtnText;
        submitBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
