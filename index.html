<!DOCTYPE html> 
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro Garden Furniture</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Segoe UI', sans-serif; } .modal { transition: opacity 0.25s ease; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVIGATION, LANDING, ADMIN, SHOP (Remaining same as before for stability) -->
    <!-- ... (Keep same HTML as before, just update the MODAL section below) ... -->

    <!-- UPDATED ORDER MODAL -->
    <div id="order-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 transition-all duration-300">
        <div class="modal-overlay absolute w-full h-full bg-gray-950 opacity-60" onclick="closeOrderModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-y-auto max-h-[90vh] p-6 border border-gray-100">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h3 id="modal-product-name" class="text-xl font-bold text-green-800"></h3>
                <button onclick="closeOrderModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold cursor-pointer">&times;</button>
            </div>
            
            <form id="order-form" onsubmit="submitOrder(event)">
                <input type="hidden" id="order-item-name">
                
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">ብዛት (Quantity)</label>
                    <input type="number" id="customer-quantity" min="1" value="1" required class="w-full border border-gray-300 p-2 rounded-md focus:outline-green-600">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">ሙሉ ስም</label>
                    <input type="text" id="customer-name" required class="w-full border border-gray-300 p-2 rounded-md focus:outline-green-600">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">ስልክ ቁጥር</label>
                    <input type="tel" id="customer-phone" required class="w-full border border-gray-300 p-2 rounded-md focus:outline-green-600">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">የከፈሉበት የደረሰኝ ፎቶ</label>
                    <input type="file" id="customer-receipt-file" accept="image/*" class="w-full text-xs text-gray-500">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">የፋይዳ (መታወቂያ) ፎቶ</label>
                    <input type="file" id="customer-fayda-file" accept="image/*" class="w-full text-xs text-gray-500">
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-green-700 text-white p-3 rounded-lg font-bold">ትዕዛዝ ላክ</button>
            </form>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8762925667:AAHOMw311XdcubZWs-dBI1Xz7uS7QgKOVK8';
        const CHAT_ID = '7303942788'; 

        // UPDATED SUBMISSION LOGIC
        async function submitOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "በመላክ ላይ...";

            try {
                // 1. መረጃውን በፅሁፍ እንላክ
                const msg = `🛍️ አዲስ ትዕዛዝ\n📦 እቃ: ${document.getElementById('order-item-name').value}\n🔢 ብዛት: ${document.getElementById('customer-quantity').value}\n👤 ስም: ${document.getElementById('customer-name').value}\n📞 ስልክ: ${document.getElementById('customer-phone').value}`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
                });

                // 2. ፎቶዎችን በየተራ እንላክ (FormData በመጠቀም)
                const receiptFile = document.getElementById('customer-receipt-file').files[0];
                const faydaFile = document.getElementById('customer-fayda-file').files[0];

                if (receiptFile) {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', receiptFile);
                    fd.append('caption', '🧾 የደረሰኝ ፎቶ');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }

                if (faydaFile) {
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', faydaFile);
                    fd.append('caption', '🪪 የፋይዳ (መታወቂያ) ፎቶ');
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }

                alert('✅ ትዕዛዝዎ በተሳካ ሁኔታ ተልኳል!');
                document.getElementById('order-form').reset();
                closeOrderModal();
            } catch (err) {
                alert('ስህተት ተፈጥሯል: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "ትዕዛዝ ላክ";
            }
        }
        
        // ... (Keep the rest of your previous logic/functions as they were) ...
    </script>
</body>
</html>
