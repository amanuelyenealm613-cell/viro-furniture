<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro Store & Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans text-gray-800 pb-12">

    <!-- Header & Navigation -->
    <header class="bg-amber-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wide flex items-center gap-2">
                <i class="fa-solid font-bold fa-store"></i> VIRO STORE
            </h1>
            <nav class="flex gap-2">
                <button onclick="switchTab('shop')" id="tab-btn-shop" class="px-4 py-2 rounded-lg text-sm font-bold bg-amber-900 text-white transition">
                    <i class="fa-solid fa-cart-shopping mr-1"></i> ዋና ገፅ (Shop)
                </button>
                <button onclick="switchTab('store')" id="tab-btn-store" class="px-4 py-2 rounded-lg text-sm font-bold bg-amber-700 hover:bg-amber-900 text-amber-100 transition">
                    <i class="fa-solid fa-warehouse mr-1"></i> እስቶር (Store)
                </button>
                <button onclick="switchTab('admin')" id="tab-btn-admin" class="px-4 py-2 rounded-lg text-sm font-bold bg-amber-700 hover:bg-amber-900 text-amber-100 transition">
                    <i class="fa-solid fa-user-shield mr-1"></i> አድሚን (Admin)
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6">

        <!-- 1. ዋና ገፅ (SHOP SECTION - ለደንበኞች የሚታዩ ምርቶች ብቻ) -->
        <section id="section-shop" class="space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-boxes-packing text-amber-700"></i> ለሽያጭ የቀረቡ ምርቶች
                </h2>
                <span id="shop-item-count" class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full">0 ምርቶች</span>
            </div>

            <!-- Grid of Shop Products -->
            <div id="shop-products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Products will be dynamically rendered here -->
            </div>
        </section>


        <!-- 2. እስቶር ገፅ (STORE ADMISSION SECTION - በእስቶር ያሉ ጥሬ እቃዎች ብቻ) -->
        <section id="section-store" class="space-y-6 hidden">
            <!-- Add Raw Store Item Form -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                <h3 class="text-base font-bold text-gray-800 flex items-center gap-2 border-b pb-3">
                    <i class="fa-solid fa-circle-plus text-green-600"></i> አዲስ እቃ ወደ እስቶር ማስገቢያ
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">የእቃው ስም</label>
                        <input type="text" id="admission-new-name" placeholder="ለምሳሌ: የበረዳ ሳፋ" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">ቢሮ/ክፍል</label>
                        <input type="text" id="admission-new-office" placeholder="ለምሳሌ: ቢሮ 1" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">ብዛት</label>
                        <input type="number" id="admission-new-stock" placeholder="0" min="1" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                </div>
                <div class="flex justify-end">
                    <button onclick="addAdmissionRawItem()" class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> እቃውን ወደ እስቶር መዝግብ
                    </button>
                </div>
            </div>

            <!-- Raw Items List in Store -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                <h3 class="text-base font-bold text-gray-800 border-b pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-boxes-stacked text-amber-700"></i> በእስቶር ውስጥ ያሉ ጥሬ እቃዎች ዝርዝር
                </h3>
                <div id="store-raw-items-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Store items will be rendered here -->
                </div>
            </div>
        </section>


        <!-- 3. አድሚን ገፅ (ADMIN DASHBOARD - ትዕዛዞችና አዲስ ምርት መጫኛ) -->
        <section id="section-admin" class="space-y-6 hidden">
            <!-- Add Product to Shop Form -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                <h3 class="text-base font-bold text-gray-800 border-b pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle text-amber-700"></i> አዲስ ምርት ወደ ዋናው ገፅ (Shop) መጫኛ
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">የምርት ስም</label>
                        <input type="text" id="admin-prod-name" placeholder="ለምሳሌ: ሶፋ" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">ዋጋ (ብር)</label>
                        <input type="number" id="admin-prod-price" placeholder="0.00" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">የምስል URL (Image Link)</label>
                        <input type="text" id="admin-prod-img" placeholder="https://..." class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none">
                    </div>
                </div>
                <div class="flex justify-end">
                    <button onclick="addShopProduct()" class="bg-amber-800 hover:bg-amber-900 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition">
                        ለሽያጭ ወደ ዋና ገፅ ጫን
                    </button>
                </div>
            </div>

            <!-- Customer Orders List -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                <h3 class="text-base font-bold text-gray-800 border-b pb-3 flex items-center gap-2">
                    <i class="fa-solid fa-receipt text-amber-700"></i> የደንበኞች ትዕዛዝ ማረጋገጫ
                </h3>
                <div id="admin-orders-container" class="space-y-3">
                    <!-- Orders will be rendered here -->
                </div>
            </div>
        </section>

    </main>

    <!-- JS Logic -->
    <script>
        // ==========================================
        // 1. CONFIGURATION & STATE MANAGEMENT
        // ==========================================
        const TELEGRAM_CHANNEL_LINK = "https://t.me/your_channel_link"; 
        const BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"; 
        const CHAT_ID = "YOUR_CHAT_ID_HERE";     

        // ዳታዎችን ከ LocalStorage መጫን
        let products = JSON.parse(localStorage.getItem('viro_products')) || [
            {
                name: "የበረዳ ሳፋ",
                price: 25000,
                img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500"
            }
        ];

        let storeRawItems = JSON.parse(localStorage.getItem('viro_store_raw_items')) || [
            {
                name: "የበረዳ ሳፋ (ጥሬ እቃ)",
                office: "ዋና እስቶር",
                stock: 10,
                img: "https://images.unsplash.com/photo-1581428982868-e410dd047a90?w=500"
            }
        ];

        let customerOrders = JSON.parse(localStorage.getItem('viro_orders')) || [
            {
                name: "Amanuel yenealm",
                product: "የበረዳ ሳፋ",
                qty: 1
            }
        ];

        // ==========================================
        // 2. NAVIGATION BETWEEN TABS
        // ==========================================
        function switchTab(tabName) {
            document.getElementById('section-shop').classList.add('hidden');
            document.getElementById('section-store').classList.add('hidden');
            document.getElementById('section-admin').classList.add('hidden');

            document.getElementById('tab-btn-shop').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-700 hover:bg-amber-900 text-amber-100 transition";
            document.getElementById('tab-btn-store').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-700 hover:bg-amber-900 text-amber-100 transition";
            document.getElementById('tab-btn-admin').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-700 hover:bg-amber-900 text-amber-100 transition";

            if (tabName === 'shop') {
                document.getElementById('section-shop').classList.remove('hidden');
                document.getElementById('tab-btn-shop').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-900 text-white transition";
            } else if (tabName === 'store') {
                document.getElementById('section-store').classList.remove('hidden');
                document.getElementById('tab-btn-store').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-900 text-white transition";
            } else if (tabName === 'admin') {
                document.getElementById('section-admin').classList.remove('hidden');
                document.getElementById('tab-btn-admin').className = "px-4 py-2 rounded-lg text-sm font-bold bg-amber-900 text-white transition";
            }
        }

        // ==========================================
        // 3. SHOP SECTION (ዋና ገፅ)
        // ==========================================
        function renderShopProducts() {
            const container = document.getElementById('shop-products-container');
            const countLabel = document.getElementById('shop-item-count');
            if (!container) return;

            countLabel.textContent = `${products.length} ምርቶች`;

            if (products.length === 0) {
                container.innerHTML = `<p class="text-sm text-gray-400 italic col-span-full text-center py-8">ምንም ለሽያጭ የቀረበ ምርት የለም።</p>`;
                return;
            }

            container.innerHTML = products.map((p, i) => `
                <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm hover:shadow-md transition">
                    <img src="${p.img}" class="w-full h-48 object-cover bg-gray-50">
                    <div class="p-4 space-y-2">
                        <h3 class="font-bold text-gray-800 text-base">${p.name}</h3>
                        <p class="text-amber-800 font-extrabold text-lg">${p.price.toLocaleString()} ብር</p>
                        <button onclick="placeOrder('${p.name}')" class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-2 rounded-lg text-sm transition">
                            እዘዝ / ግዛ
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function placeOrder(prodName) {
            customerOrders.push({
                name: "Amanuel yenealm",
                product: prodName,
                qty: 1
            });
            localStorage.setItem('viro_orders', JSON.stringify(customerOrders));
            renderAdminOrders();
            alert(`✅ ${prodName} በስኬት ታዝዟል! ወደ አድሚን ገፅ በመሄድ ማረጋገጥ ይችላሉ።`);
        }

        function addShopProduct() {
            const name = document.getElementById('admin-prod-name').value.trim();
            const price = parseFloat(document.getElementById('admin-prod-price').value);
            const img = document.getElementById('admin-prod-img').value.trim() || "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500";

            if (!name || isNaN(price)) return alert("⚠️ እባክዎን ትክክለኛ የምርት ስም እና ዋጋ ያስገቡ!");

            products.push({ name, price, img });
            localStorage.setItem('viro_products', JSON.stringify(products));
            renderShopProducts();

            document.getElementById('admin-prod-name').value = "";
            document.getElementById('admin-prod-price').value = "";
            document.getElementById('admin-prod-img').value = "";

            alert("✅ ምርቱ ወደ ዋናው ገፅ (Shop) በስኬት ተጨምሯል!");
        }

        // ==========================================
        // 4. STORE ADMISSION SECTION (እስቶር ብቻ)
        // ==========================================
        function addAdmissionRawItem() {
            const nameInput = document.getElementById('admission-new-name');
            const officeInput = document.getElementById('admission-new-office');
            const stockInput = document.getElementById('admission-new-stock');

            const name = nameInput.value.trim();
            const office = officeInput.value.trim() || "ዋና ቢሮ";
            const stock = parseInt(stockInput.value);

            if (!name || isNaN(stock) || stock <= 0) {
                return alert("⚠️ እባክዎን የእቃውን ስም እና ትክክለኛ ብዛት ያስገቡ!");
            }

            const img = "https://images.unsplash.com/photo-1581428982868-e410dd047a90?w=500";

            // እቃውን ወደ እስቶር ብቻ መጨመር (ወደ ዋና ገፅ products አይጨመርም)
            storeRawItems.push({ name, office, stock, img });

            localStorage.setItem('viro_store_raw_items', JSON.stringify(storeRawItems));
            renderStoreRawItems();

            nameInput.value = "";
            officeInput.value = "";
            stockInput.value = "";

            alert("✅ አዲስ እቃ ወደ እስቶር ብቻ በተሳካ ሁኔታ ገብቷል!");
        }

        function renderStoreRawItems() {
            const container = document.getElementById('store-raw-items-container');
            if (!container) return;

            if (storeRawItems.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 italic text-center col-span-full py-4">በእስቶር ውስጥ የተመዘገበ ጥሬ እቃ የለም።</p>`;
                return;
            }

            container.innerHTML = storeRawItems.map((item, index) => `
                <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl flex items-center gap-4 shadow-sm">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-lg bg-white border">
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800 text-sm mb-0.5">${item.name}</h4>
                        <p class="text-xs text-blue-800 font-bold mb-1">🏢 ቢሮ/ክፍል፦ ${item.office}</p>
                        <p class="text-xs text-gray-600">በእስቶር ያለው ብዛት: <span class="font-extrabold text-green-700 text-sm">${item.stock}</span></p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="updateAdmissionStock(${index}, -1)" class="bg-red-500 hover:bg-red-600 text-white w-7 h-7 rounded-full font-bold text-xs flex items-center justify-center">-</button>
                        <button onclick="updateAdmissionStock(${index}, 1)" class="bg-green-600 hover:bg-green-700 text-white w-7 h-7 rounded-full font-bold text-xs flex items-center justify-center">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateAdmissionStock(index, amount) {
            let current = storeRawItems[index].stock || 0;
            if (current + amount < 0) return alert("⚠️ የእቃ ብዛት ከ 0 በታች መሆን አይችልም!");
            
            storeRawItems[index].stock = current + amount;
            localStorage.setItem('viro_store_raw_items', JSON.stringify(storeRawItems));
            renderStoreRawItems();
        }

        // ==========================================
        // 5. ADMIN ORDERS & TELEGRAM NOTIFICATION
        // ==========================================
        function renderAdminOrders() {
            const container = document.getElementById('admin-orders-container');
            if (!container) return;

            if (customerOrders.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-4">ምንም ያልፀደቀ ትዕዛዝ የለም።</p>`;
                return;
            }

            container.innerHTML = customerOrders.map((order, i) => `
                <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl flex items-center justify-between">
                    <div>
                        <h4 class="font-bold text-gray-800 text-sm">${order.name}</h4>
                        <p class="text-xs text-gray-600">ያዘዙት እቃ: <span class="font-bold text-amber-800">${order.product}</span> (ብዛት: ${order.qty})</p>
                    </div>
                    <button onclick="confirmOrder(${i})" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-4 py-2 rounded-lg flex items-center gap-1 transition">
                        <i class="fa-solid fa-check"></i> ትዕዛዝ አፅድቅ & መልእክት ላክ
                    </button>
                </div>
            `).join('');
        }

        async function confirmOrder(index) {
            const order = customerOrders[index];
            if (!order) return;

            const msg = `✅ **ትዕዛዝዎ ተረጋግጧል!**\n\n` +
                        `ውድ **${order.name}**፤ ያዘዙት **${order.product}** (ብዛት: ${order.qty}) ክፍያዎ ተረጋግጦ ትዕዛዝዎ ጸድቋል። በቅርብ ጊዜ እናደርስልዎታለን!\n\n` +
                        `👉 ክፍያ ሲፈፅሙ እቃው በእርግጥ መረጋገጡን እዚህ ቻናል ላይ ገብተው ይመልከቱ፦\n` +
                        `${TELEGRAM_CHANNEL_LINK}`;

            try {
                if (BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE") {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: msg,
                            parse_mode: 'Markdown',
                            disable_web_page_preview: false
                        })
                    });
                }
                
                alert(`✅ የ ${order.name} ትዕዛዝ ተረጋግጧል!`);
                customerOrders.splice(index, 1);
                localStorage.setItem('viro_orders', JSON.stringify(customerOrders));
                renderAdminOrders();

            } catch (err) {
                alert("⚠️ መልእክቱን ወደ ቴሌግራም መላክ አልተቻለም!");
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderShopProducts();
            renderStoreRawItems();
            renderAdminOrders();
        });
    </script>
</body>
</html>
