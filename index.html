<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro Garden Furniture</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .modal { transition: opacity 0.25s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVIGATION BAR -->
    <nav class="bg-gradient-to-r from-green-800 to-green-700 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-2 flex justify-between items-center">
            <a href="#" onclick="showSection('landing')" class="flex items-center gap-2 tracking-wide">
                <!-- የቪሮ ኦፊሴላዊ ሎጎ -->
                <img src="https://i.imgur.com/7xN6F29.png" alt="Viro Logo" class="h-12 w-12 rounded-full border-2 border-yellow-400 object-cover bg-white">
                <span class="text-xl font-bold">Viro Furniture</span>
            </a>
            <div class="flex items-center gap-4">
                <button onclick="showSection('landing')" class="hover:text-yellow-300 font-semibold cursor-pointer transition">ቤት</button>
                <button onclick="showSection('shop')" class="hover:text-yellow-300 font-semibold cursor-pointer transition">ምርቶች</button>
                <button onclick="toggleAdminLogin()" class="bg-green-900 hover:bg-green-950 text-yellow-400 px-3 py-1.5 rounded-md text-sm font-bold transition cursor-pointer border border-green-600">
                    <i class="fa-solid fa-lock"></i> አድሚን
                </button>
            </div>
        </div>
    </nav>

    <!-- IN-PAGE ADMIN LOGIN BOX (ሚስጥራዊነቱ የተጠበቀ መግቢያ) -->
    <div id="admin-login-box" class="hidden container mx-auto px-4 mt-4 max-w-sm">
        <div class="bg-white p-4 rounded-lg shadow-md border border-gray-200">
            <h3 class="text-sm font-bold text-gray-700 mb-2">የአድሚን የይለፍ ቃል ያስገቡ</h3>
            <div class="flex gap-2">
                <input type="password" id="admin-pass-input" placeholder="****" class="border p-2 rounded w-full focus:outline-green-600 text-center font-bold">
                <button onclick="verifyAdminLogin()" class="bg-green-700 text-white px-4 py-2 rounded font-bold hover:bg-green-800 cursor-pointer">ግባ</button>
            </div>
            <p id="login-error" class="text-red-500 text-xs mt-1 hidden">⚠️ የተሳሳተ የይለፍ ቃል ነው!</p>
        </div>
    </div>

    <!-- SECTION 1: LANDING (HERO) -->
    <div id="landing-section" class="section">
        <div class="bg-gradient-to-r from-green-950 via-green-850 to-emerald-800 text-white py-16 px-4 text-center relative overflow-hidden">
            <div class="relative z-10 max-w-3xl mx-auto flex flex-col items-center">
                <div class="mb-6 transform hover:scale-105 transition duration-300">
                    <!-- ዋናው ገፅ ላይ የሚታይ ትልቅ ሎጎ -->
                    <img src="https://i.imgur.com/7xN6F29.png" alt="Viro Big Logo" class="h-36 w-36 rounded-full border-4 border-yellow-400 shadow-2xl mx-auto bg-white p-1">
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight drop-shadow-md">Viro Garden Furniture</h1>
                <p class="text-xl md:text-2xl mb-8 text-green-100 font-light">Made in Ethiopia - ጥራት ያላቸው የቤትና የጓሮ ፈርኒቸሮች አምራች!</p>
                <div class="flex flex-col sm:flex-row justify-center items-center gap-4 w-full sm:w-auto">
                    <button onclick="showSection('shop')" class="w-full sm:w-auto bg-yellow-500 text-gray-900 font-bold px-8 py-3.5 rounded-full text-lg shadow-lg hover:bg-yellow-400 cursor-pointer transition transform hover:scale-105">
                        <i class="fa-solid fa-bag-shopping mr-2"></i> ምርቶችን ለመግዛት እዚህ ይጫኑ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION 2: SHOP -->
    <div id="shop-section" class="section hidden container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center text-green-800 mb-2 font-serif">የቪሮ ምርቶች ዝርዝር</h2>
        <p class="text-center text-gray-500 mb-10">የሚፈልጉትን መርጠው ማዘዝ ይችላሉ</p>
        <div id="products-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
    </div>

    <!-- SECTION 3: ADMIN PANEL (የተሟላ ማስተዳደሪያ) -->
    <div id="admin-panel" class="section hidden container mx-auto px-4 py-8 bg-green-50 rounded-xl shadow-md my-6 border border-green-200">
        <div class="flex justify-between items-center border-b border-green-200 pb-4 mb-6">
            <h2 class="text-2xl font-bold text-green-900"><i class="fa-solid fa-gear text-green-700"></i> የምርት ማስተዳደሪያ (Admin Panel)</h2>
            <button onclick="hideAdmin()" class="bg-red-100 text-red-600 px-3 py-1 rounded hover:bg-red-200 transition font-bold cursor-pointer">ፓነሉን ዝጋ</button>
        </div>
        
        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-5 rounded-lg border border-gray-200 shadow-sm md:col-span-1">
                <h3 class="font-bold text-gray-700 mb-3 text-lg">አዲስ ምርት መጫኛ</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs text-gray-500 font-bold mb-1">የምርት ስም</label>
                        <input id="new-name" placeholder="ለምሳሌ፡ የበረንዳ ሶፋ" class="w-full border p-2.5 rounded bg-white text-sm focus:outline-green-600">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-bold mb-1">ዋጋ (ብር)</label>
                        <input id="new-price" type="number" placeholder="ለምሳሌ፡ 45000" class="w-full border p-2.5 rounded bg-white text-sm focus:outline-green-600">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-bold mb-1">የባንክ / ቴሌብር አካውንት መረጃ</label>
                        <input id="new-payment" placeholder="CBE: 1000... ወይም ቴሌብር" class="w-full border p-2.5 rounded bg-white text-sm focus:outline-green-600">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-bold mb-1">የምርት ፎቶ (ከጋለሪ ምረጥ)</label>
                        <input id="new-img-file" type="file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
                    </div>
                    <button onclick="addProduct()" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-2.5 rounded shadow cursor-pointer transition mt-2">
                        <i class="fa-solid fa-plus mr-1"></i> ምርቱን ጨምር
                    </button>
                </div>
            </div>
            
            <div class="md:col-span-2 bg-white p-5 rounded-lg border border-gray-200 shadow-sm">
                <h3 class="font-bold text-gray-700 mb-3 text-lg">በገፁ ላይ ያሉ ምርቶች ማስተካከያ (መቀነሻ/ማጥፊያ)</h3>
                <div id="admin-product-list" class="space-y-2 max-h-[380px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <!-- ORDER MODAL (የዘመነ የግብይት ገፅ) -->
    <div id="order-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 transition-all duration-300">
        <div class="modal-overlay absolute w-full h-full bg-gray-950 opacity-60" onclick="closeOrderModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-y-auto max-h-[90vh] p-6 border border-gray-100">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h3 id="modal-product-name" class="text-xl font-bold text-green-800"></h3>
                <button onclick="closeOrderModal()" class="text-gray-400 hover:text-gray-600 text-2xl font-bold cursor-pointer">&times;</button>
            </div>
            <p id="modal-product-price" class="text-xl font-extrabold text-green-700 mb-1"></p>
            <p id="modal-payment-info" class="text-xs bg-yellow-50 text-yellow-800 p-2.5 rounded mb-4 border border-yellow-100 font-medium"></p>
            
            <form id="order-form" onsubmit="submitOrder(event)">
                <input type="hidden" id="order-item-name">
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">ሙሉ ስም</label>
                    <input type="text" id="customer-name" required class="w-full border p-2 rounded focus:outline-green-600 bg-gray-50">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">ስልክ ቁጥር</label>
                    <input type="tel" id="customer-phone" required class="w-full border p-2 rounded focus:outline-green-600 bg-gray-50">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">የደረሰኝ ሊንክ (ከሌለ ይለፉት)</label>
                    <input type="url" id="customer-receipt-link" placeholder="https://..." class="w-full border p-2 rounded focus:outline-green-600 bg-gray-50 text-sm">
                </div>
                <div class="mb-3">
                    <label class="block text-sm text-gray-600 font-semibold mb-1">የከፈሉበት የደረሰኝ ፎቶ (ከጋለሪ)</label>
                    <input type="file" id="customer-receipt-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200 cursor-pointer">
                </div>
                <div class="mb-4">
                    <button type="button" onclick="getLocation()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded font-bold shadow transition flex items-center justify-center gap-2 cursor-pointer">
                        <span id="location-status"><i class="fa-solid fa-location-crosshairs"></i> ትክክለኛ መገኛ ቦታ (📍 የተስተካከለ GPS)</span>
                    </button>
                </div>
                <input type="hidden" id="customer-location">
                <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white p-3 rounded-lg font-bold shadow-lg transition text-center cursor-pointer block">
                    <i class="fa-solid fa-paper-plane mr-1"></i> ትዕዛዝ እና የክፍያ መረጃ ላክ
                </button>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const BOT_TOKEN = '8762925667:AAHOMw311XdcubZWs-dBI1Xz7uS7QgKOVK8';
        const CHAT_ID = '7303942788'; 

        let products = JSON.parse(localStorage.getItem('viro_products')) || [
            { name: "የበረንዳ ሶፋ እሽግ", price: "45000", payment: "ቴሌብር ወይም ንግድ ባንክ ያስገቡ", img: "https://images.unsplash.com/photo-1581428982868-e410dd047a90?w=500" }
        ];

        let uploadedImageBase64 = "";
        let uploadedReceiptBase64 = "";

        // የምርት ፎቶ ከጋለሪ መቀበያ
        document.getElementById('new-img-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { uploadedImageBase64 = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        // የደረሰኝ ፎቶ ከጋለሪ መቀበያ
        document.getElementById('customer-receipt-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { uploadedReceiptBase64 = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${sectionId}-section`).classList.remove('hidden');
            if(sectionId === 'shop') renderProducts();
        }

        function renderProducts() {
            localStorage.setItem('viro_products', JSON.stringify(products));
            
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            products.forEach((p, index) => {
                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-xl transition duration-300 flex flex-col justify-between p-4">
                        <div>
                            <img src="${p.img || 'https://placehold.co/500x350?text=No+Image'}" class="w-full h-56 object-cover bg-gray-100 rounded">
                            <div class="mt-4">
                                <h3 class="font-bold text-xl text-gray-800 mb-1">${p.name}</h3>
                                <p class="text-green-700 font-black text-lg mb-2">${Number(p.price).toLocaleString()} ብር</p>
                            </div>
                        </div>
                        <button onclick="openOrderModal(${index})" class="w-full bg-green-700 hover:bg-green-800 text-white mt-2 py-2.5 rounded-lg font-bold shadow cursor-pointer transition flex items-center justify-center gap-1">
                            <i class="fa-solid fa-cart-plus"></i> አሁን እዘዝ
                        </button>
                    </div>
                `;
            });

            // አድሚን ላይ የእቃዎች ዝርዝር ማሳያ (ለመቀነስ/ለማጥፋት)
            const adminList = document.getElementById('admin-product-list');
            adminList.innerHTML = products.map((p, i) => `
                <div class="flex justify-between items-center bg-gray-50 border p-3 rounded-lg">
                    <div class="flex items-center gap-3">
                        <img src="${p.img}" class="w-10 h-10 object-cover rounded">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${p.name}</p>
                            <p class="text-xs text-green-700">${Number(p.price).toLocaleString()} ብር</p>
                        </div>
                    </div>
                    <button onclick="deleteProduct(${i})" class="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded text-xs font-bold cursor-pointer">
                        <i class="fa-solid fa-trash-can"></i> ሰርዝ
                    </button>
                </div>
            `).join('');
        }

        // አድሚን ፖፕ-አፕ ሳይሆን እዚሁ ገፅ ላይ መግቢያ ማሳያ
        function toggleAdminLogin() {
            const loginBox = document.getElementById('admin-login-box');
            loginBox.classList.toggle('hidden');
            document.getElementById('admin-pass-input').value = "";
            document.getElementById('login-error').classList.add('hidden');
        }

        function verifyAdminLogin() {
            const inputPass = document.getElementById('admin-pass-input').value.trim();
            if(inputPass === '2116') {
                document.getElementById('admin-login-box').classList.add('hidden');
                showSection('admin');
                document.getElementById('admin-panel').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function hideAdmin() {
            document.getElementById('admin-panel').classList.add('hidden');
            showSection('shop');
        }

        function addProduct() {
            const name = document.getElementById('new-name').value.trim();
            const price = document.getElementById('new-price').value.trim();
            const payment = document.getElementById('new-payment').value.trim();

            if(!name || !price || !payment) {
                alert("⚠️ እባክዎ ሁሉንም መረጃዎች በትክክል ይሙሉ!");
                return;
            }

            products.push({
                name: name,
                price: price,
                payment: payment,
                img: uploadedImageBase64 || "https://images.unsplash.com/photo-1581428982868-e410dd047a90?w=500"
            });

            document.getElementById('new-name').value = "";
            document.getElementById('new-price').value = "";
            document.getElementById('new-payment').value = "";
            document.getElementById('new-img-file').value = "";
            uploadedImageBase64 = "";

            renderProducts();
            alert("✅ አዲስ ምርት በትክክል ተጨምሯል!");
        }

        function deleteProduct(i) {
            if(confirm("ይህንን እቃ ከዝርዝር ውስጥ መቀነስ/መሰረዝ ይፈልጋሉ?")) {
                products.splice(i, 1);
                renderProducts();
            }
        }

        function openOrderModal(index) {
            const p = products[index];
            document.getElementById('modal-product-name').innerText = p.name;
            document.getElementById('modal-product-price').innerText = `ዋጋ፡ ${Number(p.price).toLocaleString()} ብር`;
            document.getElementById('modal-payment-info').innerText = `💳 የክፍያ መረጃ፡ ${p.payment || 'ቴሌብር ወይንም ንግድ ባንክ'}`;
            document.getElementById('order-item-name').value = p.name;
            document.getElementById('customer-location').value = "";
            document.getElementById('location-status').innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> ትክክለኛ መገኛ ቦታ (📍 GPS)`;
            
            document.getElementById('order-modal').classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeOrderModal() { document.getElementById('order-modal').classList.add('opacity-0', 'pointer-events-none'); }

        function getLocation() {
            const status = document.getElementById('location-status');
            if (navigator.geolocation) {
                status.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 📍 መገኛ ቦታዎን በትክክል በመፈለግ ላይ...`;
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        document.getElementById('customer-location').value = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        status.innerHTML = `<i class="fa-solid fa-circle-check text-yellow-400"></i> 📍 ቦታዎ በትክክል ተይዟል!`;
                    },
                    (err) => { status.innerHTML = `⚠️ እባክዎ የስልክዎን GPS/Location ያብሩት!`; }
                );
            }
        }

        function submitOrder(e) {
            e.preventDefault();
            const pName = document.getElementById('order-item-name').value;
            const cName = document.getElementById('customer-name').value;
            const cPhone = document.getElementById('customer-phone').value;
            const cReceiptLink = document.getElementById('customer-receipt-link').value || "አልተካተተም";
            const cLoc = document.getElementById('customer-location').value || "ቦታ አልተላከም";

            const message = `🛍️ **አዲስ የቪሮ ትዕዛዝ እና ክፍያ**\n\n` +
                            `📦 **የእቃ ስም:** ${pName}\n` +
                            `👤 **የደንበኛ ስም:** ${cName}\n` +
                            `📞 **ስልክ ቁጥር:** ${cPhone}\n` +
                            `🔗 **የደረሰኝ ሊንክ:** ${cReceiptLink}\n` +
                            `📍 **የመገኛ ቦታ (GPS):** ${cLoc}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    alert('✅ ትዕዛዝዎ እና ክፍያዎ በተሳካ ሁኔታ ደርሶናል!');
                    document.getElementById('order-form').reset();
                    closeOrderModal();
                } else {
                    alert('❌ ስህተት፡ ' + data.description);
                }
            });
        }

        showSection('landing');
    </script>
